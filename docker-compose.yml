services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - MONGODB_URI=mongodb://db:27017/kim_dashboard
      - NEXT_PUBLIC_APP_URL=http://localhost:3000
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  worker:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
    command: sh -c "while true; do node scripts/worker.js 2>/dev/null || true; sleep 60; done"
    environment:
      - MONGODB_URI=mongodb://db:27017/kim_dashboard
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - worker

volumes:
  mongodb_data:
